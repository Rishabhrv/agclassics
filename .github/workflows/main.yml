name: Deploy AG Classics Frontend

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 60s
          script: |
            set -e

            cd /home/rishabhvyas/EbookApp/agclassics

            git reset --hard
            git pull origin master

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 24.2.0

            npm install
            npm run build

            pm2 restart agclassics --update-env || pm2 start npm --name "agclassics" -- start -- --port 3001

            echo "✅ AG Classics Frontend Deployment Successful!"
